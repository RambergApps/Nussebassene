<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nussebassene — Lever tips</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="app-config.js"></script>
<script src="data/data.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #060912;
  --surface: #0d1320;
  --card:    #111a2e;
  --card2:   #152035;
  --border:  #1e2d4a;
  --accent:  #ef2b2d;
  --gold:    #ffd600;
  --red:     #ff5a5a;
  --success: #00e676;
  --text:    #e8f0ff;
  --muted:   #6b7fa8;
  --locked:  #0b101c;
}
body {
  font-family: 'Barlow', sans-serif;
  background:
    radial-gradient(ellipse at 50% -180px, rgba(239,43,45,.10) 0%, transparent 58%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(239,43,45,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(239,43,45,.025) 1px, transparent 1px);
  background-size: 48px 48px;
}
a { color: inherit; text-decoration: none; }
.hero {
  position: relative; z-index: 1;
  background:
    linear-gradient(180deg, rgba(6,9,18,.28), rgba(6,9,18,.92)),
    linear-gradient(135deg, rgba(8,13,24,.72) 0%, rgba(18,21,40,.7) 52%, rgba(9,13,24,.9) 100%),
    url('Haaland.png');
  background-size: cover;
  background-position: center 18%;
  border-bottom: 1px solid var(--border);
  padding: 38px 24px 32px;
  text-align: center;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
}
.hero .badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(239,43,45,.12);
  border: 1px solid rgba(239,43,45,.32);
  color: var(--accent);
  border-radius: 999px;
  padding: 6px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 11px;
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: 13px;
  text-shadow: 0 1px 8px rgba(0,0,0,.75);
}
.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(50px, 11vw, 98px);
  font-weight: 400;
  text-transform: uppercase;
  line-height: .9;
  letter-spacing: .02em;
  text-shadow: 0 12px 34px rgba(0,0,0,.68);
}
.hero h1 span { color: var(--accent); }
.hero p {
  margin-top: 9px;
  color: rgba(232,240,255,.86);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(13px, 2.5vw, 17px);
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  max-width: 720px;
}
.hero-link {
  position: absolute;
  top: 16px;
  right: 20px;
  border: 1px solid rgba(232,240,255,.22);
  background: rgba(6,9,18,.32);
  color: rgba(232,240,255,.82);
  border-radius: 999px;
  padding: 6px 10px;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: .07em;
  text-transform: uppercase;
  text-shadow: 0 1px 4px rgba(0,0,0,.75);
}
.hero-link:hover { border-color: rgba(239,43,45,.48); color: #fff; background: rgba(239,43,45,.12); }
.runde-tabs {
  position: relative; z-index: 1;
  display: flex;
  gap: 0;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  background: rgba(13,19,32,.96);
  padding: 0 16px;
}
.runde-tab {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 14px 16px;
  color: var(--muted);
  border: none;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  background: transparent;
  cursor: pointer;
  transition: all .2s;
}
.runde-tab:hover { color: var(--text); }
.runde-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.runde-tab.locked { color: #40506d; }
.progress-bar-wrap {
  position: relative; z-index: 1;
  background: rgba(13,19,32,.96);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-bar-wrap .label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  white-space: nowrap;
  text-transform: uppercase;
}
.progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; width: 0%; }
.progress-count { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 900; color: var(--accent); white-space: nowrap; }
.container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }
.navn-wrap {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 18px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: end;
}
.field label {
  display: block;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}
input, select {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 10px 11px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  outline: none;
}
input:focus, select:focus { border-color: var(--accent); }
option { background: var(--surface); color: var(--text); }
button, .btn {
  border-radius: 7px;
  padding: 10px 14px;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .07em;
  text-transform: uppercase;
  transition: all .2s;
  border: 1.5px solid var(--border);
  background: rgba(13,19,32,.88);
  color: var(--text);
}
button:hover, .btn:hover { border-color: rgba(239,43,45,.55); background: rgba(239,43,45,.12); }
button.primary, .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
button.primary:hover, .btn.primary:hover { background: #ff3b3d; }
button:disabled { opacity: .45; cursor: not-allowed; }
.message { margin-bottom: 16px; }
.notice {
  padding: 12px 14px;
  border-radius: 9px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: rgba(13,19,32,.8);
  font-size: 13px;
  line-height: 1.45;
}
.notice.ok { color: #b9f6ca; border-color: rgba(0,230,118,.35); background: rgba(0,230,118,.08); }
.notice.err { color: #ff9a9a; border-color: rgba(255,90,90,.38); background: rgba(255,90,90,.09); }
.runde-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
.runde-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: .12em;
  text-transform: uppercase;
  background: var(--accent);
  color: #fff;
  padding: 3px 10px;
  border-radius: 3px;
}
.runde-header h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; text-transform: uppercase; }
.runde-header .poeng-info { margin-left: auto; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--muted); }
.runde-header .poeng-info span { color: var(--accent); font-weight: 900; }
.runde-oppsummering {
  margin: 0 0 14px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--muted);
  font-size: 13px;
}
.runde-oppsummering strong { color: var(--text); }
.kamp-kort {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 11px;
  padding: 0;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color .2s, opacity .2s;
}
.kamp-kort:hover { border-color: #344766; }
.kamp-kort.locked-kamp { opacity: .72; background: var(--locked); }
.kamp-status {
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-family: 'Barlow Condensed', sans-serif;
}
.kamp-status.open { color: var(--accent); background: rgba(239,43,45,.06); }
.kamp-status.saved { color: var(--gold); background: rgba(255,214,0,.055); }
.kamp-status.locked { color: var(--muted); background: rgba(122,138,170,.05); }
.lag-rad {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  padding: 12px 16px;
  transition: background .15s;
  gap: 12px;
}
.lag-rad + .lag-rad { border-top: 1px solid var(--border); }
.lag-rad:hover { background: rgba(255,255,255,.03); }
.lag-rad.valgt { background: rgba(239,43,45,.09); }
.lag-rad.valgt .lag-navn { color: var(--accent); }
.lag-navn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 19px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .02em;
}
.lag-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.score-wrap { display: flex; align-items: center; gap: 6px; }
.score-input-felt {
  width: 42px; height: 42px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  text-align: center;
  outline: none;
  transition: border-color .2s;
  -moz-appearance: textfield;
  padding: 0;
}
.score-input-felt::-webkit-inner-spin-button, .score-input-felt::-webkit-outer-spin-button { -webkit-appearance: none; }
.score-input-felt:focus { border-color: var(--accent); }
.score-input-felt.filled { border-color: rgba(239,43,45,.50); }
.score-input-felt:disabled { cursor: not-allowed; opacity: .55; }
.score-sep { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; color: var(--muted); }

/* ── BONUSSPØRSMÅL ── */
.bonus-panel {
  background: linear-gradient(135deg, rgba(255,214,0,.07), rgba(239,43,45,.035));
  border: 1.5px solid rgba(255,214,0,.25);
  border-radius: 12px;
  padding: 16px;
  margin: 0 0 14px;
}
.bonus-panel.helhet {
  border-color: rgba(239,43,45,.32);
  background: linear-gradient(135deg, rgba(239,43,45,.085), rgba(255,214,0,.035));
}
.bonus-heading { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
.bonus-heading h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; text-transform: uppercase; }
.bonus-heading span { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 900; color: var(--gold); white-space: nowrap; }
.bonus-intro { font-size: 12px; color: var(--muted); line-height: 1.45; margin-top: 3px; }
.bonus-grid { display: grid; gap: 12px; }
.bonus-field label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 900; line-height: 1.3; margin-bottom: 6px; color: var(--text); }
.bonus-status { font-size: 11px; color: var(--muted); margin-top: 8px; }
.bonus-status.open { color: var(--accent); }
.bonus-status.locked { color: var(--red); }
@media (max-width: 640px) {
  .bonus-heading { display: block; }
  .bonus-heading span { display: block; margin-top: 5px; }
  .bonus-panel { padding: 14px; }
}

.lever-wrap { margin-top: 24px; display: grid; gap: 10px; }
.btn-lever {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 14px 40px;
  border-radius: 7px;
  border: none;
  background: var(--accent);
  color: #fff;
  width: 100%;
}
.btn-lever:hover { background: #ff3b3d; transform: translateY(-1px); }
.helper-note { color: var(--muted); font-size: 12px; text-align: center; }
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.empty .ikon { font-size: 42px; margin-bottom: 12px; }
.empty h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; text-transform: uppercase; color: var(--text); margin-bottom: 8px; }
@media (max-width: 620px) {
  .hero { min-height: 270px; padding: 34px 14px 26px; }
  .hero-link { top: 11px; right: 11px; font-size: 9px; padding: 5px 8px; }
  .runde-tabs { padding: 0 8px; }
  .runde-tab { padding: 12px 10px; font-size: 11px; }
  .container { padding: 18px 12px 70px; }
  .navn-wrap { grid-template-columns: 1fr; }
  .runde-header { align-items: flex-start; }
  .runde-header .poeng-info { margin-left: 0; }
  .lag-navn { font-size: 16px; }
  .lag-rad { padding: 12px 12px; }
  .score-input-felt { width: 40px; height: 40px; }
}
</style>
</head>
<body>
<header class="hero">
  <a class="hero-link" href="index.html">← Forsiden</a>
  <div class="badge">⚽ Nussebassene · Lever tips</div>
  <h1>Tipp <span>utslaget</span></h1>
  <p>Resultatet etter 90 minutter teller. Ekstraomganger og straffer teller ikke.</p>
</header>
<div class="runde-tabs" id="rundeTabs"></div>
<div class="progress-bar-wrap">
  <span class="label">Fullført</span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-count" id="progressCount">0 / 0</span>
</div>
<main class="container">
  <div id="message" class="message"></div>
  <section class="navn-wrap">
    <div class="field">
      <label for="participant">Ditt navn</label>
      <input id="participant" autocomplete="name" placeholder="Skriv navn" />
    </div>
    <button type="button" id="saveNameBtn">Lagre navn</button>
  </section>
  <section id="roundContent"></section>
  <section class="lever-wrap">
    <button type="button" id="submitBtn" class="btn-lever">Lever tips</button>
    <div class="helper-note">Du kan levere på nytt frem til avspark. Siste fil overskriver for samme navn og runde.</div>
  </section>
</main>
<script>
const CONFIG = window.NUSSEBASSENE_CONFIG || {};
const DATA = window.NUSSEBASSENE_DATA || {};
const status = DATA.status || { matches: [], top_scorers: [] };
const allMatches = Array.isArray(status.matches) ? status.matches.slice() : [];
const resultater = DATA.resultater || {};
const roundLabels = { r32: 'Runde av 32', r16: 'Runde av 16', qf: 'Kvartfinale', sf: 'Semifinale', final: 'Finale' };
const roundShort = { r32: 'R32', r16: 'R16', qf: 'QF', sf: 'SF', final: 'Finale' };
const rounds = ['r32','r16','qf','sf','final'];
const BONUS_POINTS_ROUND = Number(resultater?.regler?.poeng_rundebonus || 5);
const BONUS_POINTS_OVERALL = Number(resultater?.regler?.poeng_helhetsbonus || 10);
const BONUS_SPORSMAL = {
  r32: { id:'antall_uavgjort', tekst:'Hvor mange kamper ender uavgjort i løpet av de første 90 minuttene, inkludert tilleggstid?', min:0, max:16 },
  r16: { id:'antall_nullen', tekst:'Hvor mange lag holder nullen i løpet av de første 90 minuttene, inkludert tilleggstid?', min:0, max:16 },
  qf: { id:'antall_ettmaalsseier', tekst:'Hvor mange kamper avgjøres med ett mål i løpet av de første 90 minuttene, inkludert tilleggstid?', min:0, max:4 },
  sf: { id:'totale_maal', tekst:'Hvor mange mål scores totalt i semifinalene i løpet av de første 90 minuttene, inkludert tilleggstid?', min:0, max:40 },
  final: { id:'begge_lag_scorer', tekst:'Scorer begge lag i finalen i løpet av de første 90 minuttene, inkludert tilleggstid?', type:'ja_nei' }
};
const HELHETSBONUS_TEKST = {
  flest_maal_lag:'Hvilket lag scorer flest mål fra 32-delsfinalene til og med finalen i løpet av de første 90 minuttene, inkludert tilleggstid?',
  totale_maal_utslag:'Hvor mange mål scores totalt fra 32-delsfinalene til og med finalen i løpet av de første 90 minuttene, inkludert tilleggstid?',
  golden_boot:'Hvem vinner FIFA Golden Boot?'
};
// Midlertidig unntak fordi appen ble åpnet etter første R32-avspark.
// Gjelder kun R32-rundebonus og helhetsbonus. Neste runde følger vanlig første-avspark-frist.
// 29.06.2026 kl. 23:59:59 norsk sommertid = 21:59:59 UTC.
const R32_BONUS_UTVIDET_FRIST_UTC = Date.parse('2026-06-29T21:59:59.999Z');

let activeRound = rounds.find(r => allMatches.some(m => m.runde === r && m.tippe_status === 'åpen')) || rounds.find(r => allMatches.some(m => m.runde === r)) || 'r32';
const participantInput = document.getElementById('participant');
participantInput.value = localStorage.getItem('nussebassene_participant') || '';

function esc(value) { return String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function fmtTime(iso) {
  if (!iso) return 'Ukjent tid';
  try { return new Intl.DateTimeFormat('no-NO', { weekday:'short', day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }).format(new Date(iso)); }
  catch { return iso; }
}
function statusText(m) {
  const s = m.tippe_status || '';
  if (s === 'åpen') return 'Åpen for tipping';
  if (s === 'startet') return 'Kampen har startet';
  if (s === 'ferdig') return 'Ferdigspilt';
  if (s === 'venter_lag') return 'Venter på lag';
  return 'Ikke åpen';
}
function matchOpen(m) { return m.tippe_status === 'åpen' && m.tippebar === true; }
function storageKey(matchId, side) { return `nussebassene_tip_${matchId}_${side}`; }
function bonusStorageKey(round) { return `nussebassene_bonus_${round}`; }
function helhetStorageKey(key) { return `nussebassene_helhet_${key}`; }
function showMessage(text, type = '') {
  const el = document.getElementById('message');
  if (!text) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="notice ${type}">${esc(text)}</div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function parseKickoff(m) {
  const t = Date.parse(m?.utcDate || '');
  return Number.isFinite(t) ? t : null;
}
function firstKickoff(round) {
  const times = allMatches.filter(m => m.runde === round).map(parseKickoff).filter(t => t !== null);
  return times.length ? Math.min(...times) : null;
}
function bonusDeadline(round) {
  if (round === 'r32' && Number.isFinite(R32_BONUS_UTVIDET_FRIST_UTC) && Date.now() < R32_BONUS_UTVIDET_FRIST_UTC) {
    return R32_BONUS_UTVIDET_FRIST_UTC;
  }
  return firstKickoff(round);
}
function bonusOpen(round) {
  const frist = bonusDeadline(round);
  return frist !== null && Date.now() < frist;
}
function formatBonusFrist(round) {
  const frist = bonusDeadline(round);
  if (frist === null) return 'Avventer bekreftet avsparkstid';
  if (round === 'r32' && frist === R32_BONUS_UTVIDET_FRIST_UTC) {
    return 'R32-bonus har utvidet frist til 29.06.2026 kl. 23:59 norsk tid';
  }
  return 'Stenger ' + new Date(frist).toLocaleString('no-NO', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
}
function knownR32Teams() {
  const lag = new Set();
  for (const m of allMatches.filter(x => x.runde === 'r32')) {
    [m.hjemme, m.borte].forEach(navn => {
      const n = String(navn || '').trim();
      if (n && !/^(W\d+|[123][A-L]|TBD|Winner|Runner)/i.test(n) && !n.includes('/')) lag.add(n);
    });
  }
  return [...lag].sort((a,b) => a.localeCompare(b, 'no'));
}
function scorerNames() {
  const scorers = Array.isArray(status.top_scorers) ? status.top_scorers : [];
  return scorers.map(s => s.player || s.name || s.spiller).filter(Boolean);
}
function renderTabs() {
  const el = document.getElementById('rundeTabs');
  el.innerHTML = rounds.map(r => {
    const count = allMatches.filter(m => m.runde === r).length;
    const open = allMatches.some(m => m.runde === r && matchOpen(m));
    return `<button type="button" class="runde-tab ${r === activeRound ? 'active' : ''} ${count ? '' : 'locked'}" data-round="${r}">${roundShort[r]}${open ? ' <span style="color:var(--success)">●</span>' : ''}</button>`;
  }).join('');
  el.querySelectorAll('.runde-tab').forEach(btn => btn.addEventListener('click', () => { activeRound = btn.dataset.round; renderTabs(); renderRound(); }));
}
function updateProgress(matches) {
  const openMatches = matches.filter(matchOpen);
  let filled = 0;
  for (const m of openMatches) {
    const home = document.querySelector(`[data-match-id="${CSS.escape(m.id)}"] [data-side="home"]`)?.value;
    const away = document.querySelector(`[data-match-id="${CSS.escape(m.id)}"] [data-side="away"]`)?.value;
    if (home !== '' && away !== '') filled++;
  }
  const total = openMatches.length;
  document.getElementById('progressCount').textContent = `${filled} / ${total}`;
  document.getElementById('progressFill').style.width = total ? `${Math.round((filled / total) * 100)}%` : '0%';
}
function renderRound() {
  const el = document.getElementById('roundContent');
  const matches = allMatches.filter(m => m.runde === activeRound).sort((a,b) => String(a.utcDate || '').localeCompare(String(b.utcDate || '')) || Number(a.match_no || 0) - Number(b.match_no || 0));
  if (!matches.length) {
    el.innerHTML = `<div class="empty"><div class="ikon">🔒</div><h3>Ingen kamper ennå</h3><p>Denne runden fylles automatisk når FIFA Calendar leverer kampoppsettet.</p></div>`;
    updateProgress([]);
    updateSubmitButton(matches);
    return;
  }
  const openCount = matches.filter(matchOpen).length;
  const bonusInfo = activeRound === 'r32' && bonusOpen('r32')
    ? 'R32-bonus har utvidet frist ut dagen norsk tid. Neste runder følger vanlig første-avspark-frist.'
    : 'Bonus låses ved første avspark i aktuell runde.';
  el.innerHTML = `<div class="runde-header"><span class="runde-tag">${esc(roundShort[activeRound])}</span><h2>${esc(roundLabels[activeRound])}</h2><div class="poeng-info"><span>${openCount}</span> åpne</div></div><div class="runde-oppsummering"><strong>${openCount} av ${matches.length}</strong> kamper er åpne for tipping. ${esc(bonusInfo)}</div>${activeRound === 'r32' ? renderOverallBonus() : ''}${renderRoundBonus(activeRound)}${matches.map(m => renderMatchCard(m)).join('')}`;
  for (const input of el.querySelectorAll('.score-input-felt')) {
    input.addEventListener('input', () => { input.classList.toggle('filled', input.value !== ''); localStorage.setItem(storageKey(input.dataset.matchId, input.dataset.side), input.value); updateProgress(matches); updateSubmitButton(matches); });
    input.classList.toggle('filled', input.value !== '');
  }
  for (const input of el.querySelectorAll('[data-bonus-round],[data-helhet-key]')) {
    input.addEventListener('input', () => { saveBonusInput(input); updateSubmitButton(matches); });
    input.addEventListener('change', () => { saveBonusInput(input); updateSubmitButton(matches); });
  }
  updateProgress(matches);
  updateSubmitButton(matches);
}
function renderOverallBonus() {
  const open = bonusOpen('r32');
  const disabled = open ? '' : 'disabled';
  const teams = knownR32Teams().map(lag => `<option value="${esc(lag)}" ${localStorage.getItem(helhetStorageKey('flest_maal_lag')) === lag ? 'selected' : ''}>${esc(lag)}</option>`).join('');
  const players = scorerNames().map(navn => `<option value="${esc(navn)}"></option>`).join('');
  const totalValue = localStorage.getItem(helhetStorageKey('totale_maal_utslag')) || '';
  const gb = localStorage.getItem(helhetStorageKey('golden_boot')) || '';
  return `<div class="bonus-panel helhet"><div class="bonus-heading"><div><h3>Bonus · hele utslagsfasen</h3><div class="bonus-intro">Tre spørsmål som gjelder fra 32-delsfinalene til og med finalen.</div></div><span>${BONUS_POINTS_OVERALL} poeng per spørsmål</span></div><div class="bonus-grid"><div class="bonus-field"><label>${esc(HELHETSBONUS_TEKST.flest_maal_lag)}</label><select data-helhet-key="flest_maal_lag" ${disabled}><option value="">— Velg lag —</option>${teams}</select></div><div class="bonus-field"><label>${esc(HELHETSBONUS_TEKST.totale_maal_utslag)}</label><select data-helhet-key="totale_maal_utslag" ${disabled}><option value="">— Velg intervall —</option><option value="0_46" ${totalValue === '0_46' ? 'selected' : ''}>0–46 mål</option><option value="47_77" ${totalValue === '47_77' ? 'selected' : ''}>47–77 mål</option><option value="78_pluss" ${totalValue === '78_pluss' ? 'selected' : ''}>78 mål eller flere</option></select></div><div class="bonus-field"><label>${esc(HELHETSBONUS_TEKST.golden_boot)}</label><input data-helhet-key="golden_boot" list="nussebassene-scorers" value="${esc(gb)}" placeholder="Skriv eller velg spiller" ${disabled}><datalist id="nussebassene-scorers">${players}</datalist></div></div><div class="bonus-status ${open ? 'open' : 'locked'}">${open ? formatBonusFrist('r32') : 'Bonus er stengt'}</div></div>`;
}
function renderRoundBonus(round) {
  const cfg = BONUS_SPORSMAL[round];
  const open = bonusOpen(round);
  const disabled = open ? '' : 'disabled';
  const saved = localStorage.getItem(bonusStorageKey(round)) || '';
  const input = cfg.type === 'ja_nei'
    ? `<select data-bonus-round="${round}" ${disabled}><option value="">— Velg —</option><option value="ja" ${saved === 'ja' ? 'selected' : ''}>Ja</option><option value="nei" ${saved === 'nei' ? 'selected' : ''}>Nei</option></select>`
    : `<input data-bonus-round="${round}" type="number" min="${cfg.min}" max="${cfg.max}" value="${esc(saved)}" placeholder="Svar" ${disabled}>`;
  return `<div class="bonus-panel"><div class="bonus-heading"><div><h3>Rundebonus</h3><div class="bonus-intro">${esc(cfg.tekst)}</div></div><span>${BONUS_POINTS_ROUND} poeng</span></div><div class="bonus-field">${input}</div><div class="bonus-status ${open ? 'open' : 'locked'}">${open ? formatBonusFrist(round) : 'Bonus er stengt'}</div></div>`;
}
function saveBonusInput(input) {
  if (input.dataset.bonusRound) localStorage.setItem(bonusStorageKey(input.dataset.bonusRound), input.value);
  if (input.dataset.helhetKey) localStorage.setItem(helhetStorageKey(input.dataset.helhetKey), input.value);
}
function renderMatchCard(m) {
  const open = matchOpen(m);
  const disabled = open ? '' : 'disabled';
  const statusClass = open ? 'open' : (m.tippe_status === 'ferdig' ? 'saved' : 'locked');
  const homeVal = localStorage.getItem(storageKey(m.id, 'home')) || '';
  const awayVal = localStorage.getItem(storageKey(m.id, 'away')) || '';
  return `<article class="kamp-kort ${open ? '' : 'locked-kamp'}" data-match-id="${esc(m.id)}"><div class="kamp-status ${statusClass}">${esc(m.id)} · ${esc(statusText(m))} · ${esc(fmtTime(m.utcDate))}</div><div class="lag-rad"><div><div class="lag-navn">${esc(m.hjemme || 'TBD')}</div><div class="lag-meta">Hjemme · ${esc(m.fifa_event_id ? 'FIFA ' + m.fifa_event_id : 'FIFA Calendar')}</div></div><div class="score-wrap"><input class="score-input-felt" type="number" min="0" max="30" inputmode="numeric" data-match-id="${esc(m.id)}" data-side="home" value="${esc(homeVal)}" ${disabled} aria-label="${esc(m.hjemme || 'Hjemme')}"></div></div><div class="lag-rad"><div><div class="lag-navn">${esc(m.borte || 'TBD')}</div><div class="lag-meta">Borte · 90 minutter</div></div><div class="score-wrap"><span class="score-sep">–</span><input class="score-input-felt" type="number" min="0" max="30" inputmode="numeric" data-match-id="${esc(m.id)}" data-side="away" value="${esc(awayVal)}" ${disabled} aria-label="${esc(m.borte || 'Borte')}"></div></div></article>`;
}
function collectTips() {
  const matches = allMatches.filter(m => m.runde === activeRound && matchOpen(m));
  const tips = [];
  for (const match of matches) {
    const card = document.querySelector(`[data-match-id="${CSS.escape(match.id)}"]`);
    if (!card) continue;
    const home = card.querySelector('[data-side="home"]').value;
    const away = card.querySelector('[data-side="away"]').value;
    if (home === '' && away === '') continue;
    if (home === '' || away === '') throw new Error(`Fyll inn begge tall for ${match.id}.`);
    const homeScore = Number(home);
    const awayScore = Number(away);
    if (!Number.isInteger(homeScore) || !Number.isInteger(awayScore) || homeScore < 0 || awayScore < 0 || homeScore > 30 || awayScore > 30) throw new Error(`Ugyldig resultat på ${match.id}.`);
    tips.push({ match_id: match.id, match_no: match.match_no, fifa_event_id: match.fifa_event_id, hjemme_snapshot: match.hjemme, borte_snapshot: match.borte, home_score: homeScore, away_score: awayScore });
  }
  return tips;
}
function collectRoundBonus() {
  const cfg = BONUS_SPORSMAL[activeRound];
  if (!bonusOpen(activeRound)) return null;
  const value = localStorage.getItem(bonusStorageKey(activeRound));
  if (value === null || value === '') return null;
  if (cfg.type === 'ja_nei') return { id: cfg.id, svar: value };
  const n = Number(value);
  if (!Number.isInteger(n) || n < cfg.min || n > cfg.max) throw new Error(`Ugyldig rundebonus. Svar må være mellom ${cfg.min} og ${cfg.max}.`);
  return { id: cfg.id, svar: n };
}
function collectOverallBonus() {
  if (activeRound !== 'r32' || !bonusOpen('r32')) return {};
  const out = {};
  for (const key of Object.keys(HELHETSBONUS_TEKST)) {
    const value = (localStorage.getItem(helhetStorageKey(key)) || '').trim();
    if (value) out[key] = value;
  }
  return out;
}
function countBonusPayload(roundBonus, overall) {
  return (roundBonus ? 1 : 0) + Object.keys(overall || {}).length;
}
function updateSubmitButton(matches) {
  const btn = document.getElementById('submitBtn');
  if (!btn) return;
  let tips = 0;
  try { tips = collectTips().length; } catch { tips = 0; }
  let roundBonus = null, overall = {};
  try { roundBonus = collectRoundBonus(); overall = collectOverallBonus(); } catch { /* ignorer i knapp */ }
  const bonusCount = countBonusPayload(roundBonus, overall);
  const total = tips + bonusCount;
  btn.disabled = total === 0;
  btn.textContent = total ? `Lever tips og bonus (${total})` : 'Lever tips';
}
function lagNaturligListe(items) {
  const verdier = items.filter(Boolean);
  if (verdier.length <= 1) return verdier.join('');
  if (verdier.length === 2) return verdier.join(' og ');
  return verdier.slice(0, -1).join(', ') + ' og ' + verdier[verdier.length - 1];
}

async function submitTips() {
  showMessage('');
  const participant = participantInput.value.trim();
  if (!participant) { showMessage('Skriv inn deltaker først.', 'err'); return; }
  localStorage.setItem('nussebassene_participant', participant);
  let tips, bonus, helhetsbonus;
  try {
    tips = collectTips();
    bonus = collectRoundBonus();
    helhetsbonus = collectOverallBonus();
  } catch (err) { showMessage(err.message, 'err'); return; }
  if (!tips.length && !bonus && !Object.keys(helhetsbonus).length) { showMessage('Ingen tips eller bonus å levere for denne runden.', 'err'); return; }
  const baseUrl = (CONFIG.apiBaseUrl || '').replace(/\/$/, '');
  const submitPath = CONFIG.submitPath || '/api/submit-tip';
  if (!baseUrl) { showMessage('Mangler apiBaseUrl i app-config.js. Sett den til Vercel-domenet før innsending kan testes.', 'err'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Leverer...';
  try {
    const response = await fetch(`${baseUrl}${submitPath}`, { method: 'POST', headers: { 'Content-Type': 'application/json', ...(CONFIG.submitToken ? { 'x-submit-token': CONFIG.submitToken } : {}) }, body: JSON.stringify({ participant, round: activeRound, tips, bonus, helhetsbonus, submitted_at: new Date().toISOString() }) });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(data.error || `Innsending feilet med status ${response.status}.`);
    const parts = [];
    if (tips.length) parts.push(`${tips.length} kamptips`);
    if (bonus) parts.push('1 rundebonus');
    const helhetCount = Object.keys(helhetsbonus).length;
    if (helhetCount) parts.push(`${helhetCount} helhetsbonus${helhetCount === 1 ? '' : 'er'}`);
    const levertTekst = lagNaturligListe(parts);
    showMessage(`Tips lagret! ${levertTekst} er levert. Poeng og innleveringsstatus oppdateres automatisk om kort tid.`, 'ok');
  } catch (err) { showMessage(err.message || 'Innsending feilet.', 'err'); }
  finally { btn.disabled = false; renderRound(); }
}
document.getElementById('saveNameBtn').addEventListener('click', () => { localStorage.setItem('nussebassene_participant', participantInput.value.trim()); showMessage('Navn lagret på denne enheten.', 'ok'); });
document.getElementById('submitBtn').addEventListener('click', submitTips);
renderTabs(); renderRound();
</script>
